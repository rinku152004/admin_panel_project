{% extends "base.html" %}

{% block content %}

<div class="container mt-5">



<form class="col-6 mx-auto card p-3 shadow-lg" method="POST" enctype="multipart/form-data">

{% csrf_token %}
<h2>Update Recipe</h2>

<input type="text" name="recipe_name" value="{{recipe.recipe_name}}" class="form-control mb-2">

<textarea name="recipe_ingredients" class="form-control mb-2">{{recipe.recipe_ingredients}}</textarea>

<textarea name="recipe_description" class="form-control mb-2">{{recipe.recipe_description}}</textarea>

<input type="file" name="recipe_image" class="form-control mb-2">

<img src="{{recipe.recipe_image.url}}" width="150">

<br><br>

<button type="submit" class="btn btn-success">Update Recipe</button>

</form>

</div>

{% endblock %}
