{% extends "base.html" %}

{% block content %}

<div class="container mt-5 ">

<form class="col-6 mx-auto card p-3 shadow-lg" method="POST" enctype="multipart/form-data" >
{% csrf_token %}

<h2>Register</h2>
<hr>
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success" style="color: green; font-weight: bold;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="mb-3">
    <label for="exampleInputEmail1" class="'form-label">Firstname</label>
    <input type="text" class="form-control" name="first_name" id="exampleInputEmail1">
</div>
<div class="mb-3">
    <label for="exampleInputEmail1" class="'form-label">Lastname</label>
    <input type="text" class="form-control" name="last_name" id="exampleInputEmail1">
</div>
<div class="mb-3">
    <label for="exampleInputEmail1" class="'form-label">Username</label>
    <input type="text" class="form-control" name="username" id="exampleInputEmail1">
</div>
<div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" name="password" id="exampleInputPassword1">
</div>
<p>Already have an account <a href="/accounts/login/">Login</a> </p>
<button type="submit" class="btn btn-primary">Register</button>

</form>
</div>

{% endblock %}
