<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>

        body{
            background:#f5f6fa;
        }

        .sidebar{
            width:240px;
            height:100vh;
            position:fixed;
            background:#2c3e50;
            padding-top:20px;
        }

        .sidebar a{
            display:block;
            padding:12px;
            color:white;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#34495e;
        }

        .content{
            margin-left:250px;
            padding:20px;
        }

    </style>

</head>

<body>


{% if request.user.is_authenticated %}

<div class="sidebar">

<h4 class="text-center text-white">Admin Panel</h4>

<hr style="color:white">

<a href="/dashboard/">Dashboard</a>
<a href="/dashboard/admin_list/">Admin Management</a>
<a href="/dashboard/admin_tree/">Admin Hierarchy</a>
<a href="/accounts/create_admin/">Create Admin</a>
<a href="/roles/">Roles</a>
<a href="/dashboard/reports/">Reports</a>

</div>


<div class="content">

<nav class="navbar navbar-light bg-light mb-4 shadow-lg p-3 rounded">

<div class="container-fluid">

<span class="navbar-brand ml-auto">
Welcome {{request.user.username}} !
</span>

<a href="/accounts/logout/" class="btn btn-danger btn-sm">
Logout
</a>

</div>

</nav>
{% endif %}

<!-- {% if messages %}
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
</div>
{% endif %} -->

{% block content %}

{% endblock %}


</div>

<script>
setTimeout(function(){
    let alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(alert){
        alert.style.display = 'none';
    });
},3000);
</script>

</body>
</html>
