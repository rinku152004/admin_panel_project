{% extends "base.html" %}

{% block content %}

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
{% endif %}

<h3>Roles</h3>

<a href="/roles/create_role/" class="btn btn-primary m-2">Create Role</a>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Role Name</th>
</tr>

{% for role in roles %}

<tr>
<td>{{role.id}}</td>
<td>{{role.name}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
